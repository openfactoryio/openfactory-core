name: Python Tests Coverage

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    if: github.event.pull_request == null || github.event.pull_request.merged == true
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # required if we commit back

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install .[dev] pytest-cov coverage

    - name: Run tests with coverage
      run: |
        pytest tests/openfactory/ \
          --cov=openfactory \
          --cov-report=html \
          --cov-report=xml

    - name: Upload coverage report
      uses: actions/upload-artifact@v7
      with:
        name: coverage-html
        path: htmlcov/
        retention-days: 30

    - name: Generate coverage badge
      run: python scripts/coverage_badge.py

    - name: Commit coverage badge if changed
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add tests/coverage.svg
        # Only commit if there are changes
        git diff --cached --quiet || git commit -m "Update coverage badge [skip ci]"
        git push origin HEAD:main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
