# ------------------------------------------------------------------------------
# Traefik Reverse Proxy (OpenFactory Routing Gateway - Docker Swarm)
# ------------------------------------------------------------------------------
# This Docker Compose (Swarm mode) service defines a Traefik reverse proxy used
# to expose OpenFactory applications via HTTP(S) using host-based routing in a
# Docker Swarm cluster.
#
# Core Responsibilities:
# - Dynamically discover Swarm services and their labels
# - Route incoming HTTP requests to the correct application service
# - Expose the Traefik dashboard for monitoring and debugging
#
# Routing Model:
# - Applications are exposed using **Traefik labels** generated by OpenFactory
# - Routing is based on the HTTP Host header (e.g. app.openfactory.local)
# - Each application is deployed as a Swarm service with its own router
#
# Included Features:
# - Swarm provider with label-based configuration
# - Explicit exposure control (`exposedByDefault=false`)
# - HTTP (port 80) and HTTPS (port 443) entrypoints
# - Built-in Traefik API and dashboard
#
# Dashboard Access:
# - The dashboard is exposed via host-based routing:
#
#     http://traefik.openfactory.local/dashboard/
#
# - Requires a matching DNS entry pointing to the Traefik node
#
# Notes:
# - This setup is suitable for development and staging environments
# - TLS is not configured by default (can be added via certificates or Let's Encrypt)
# - Traefik must run on a **manager node** to access the Docker API
# - Labels must be defined under `deploy.labels` for Swarm services
# - All services to be exposed must be connected to the same network (`factory-net`)
# - Traefik is an external dependency (Apache License 2.0)
# - The official Traefik Docker image is pulled at runtime
#
# Networking:
# - Uses an external Docker overlay network (`factory-net`)
# - All OpenFactory applications must join this network to be routable
#
# References:
# - Traefik Documentation: https://doc.traefik.io/traefik/
# - Swarm Provider: https://doc.traefik.io/traefik/providers/swarm/
# ------------------------------------------------------------------------------

services:
  traefik:
    image: traefik:v3.6
    command:
      - --providers.swarm=true
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedbydefault=false
      - --providers.swarm.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --api.dashboard=true

    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - factory-net

    deploy:
      placement:
        constraints:
          - node.role == manager  # important: socket access

      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dashboard.rule=Host(`traefik.openfactory.local`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
        - "traefik.http.routers.dashboard.entrypoints=web"
        - "traefik.http.routers.dashboard.service=api@internal"

networks:
  factory-net:
    external: true
