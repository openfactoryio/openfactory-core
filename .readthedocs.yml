version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    pre_build:
      - pip install .[docs]

sphinx:
  configuration: docs/conf.py
  builder: html
  args:
    - -nWT        # nit-picky checks, warnings as errors, show traceback
    - -v          # verbose
    - --keep-going
    - --warning-log
    - docs/_build/sphinx-warnings.log

post_build:
  - cat docs/_build/sphinx-warnings.log
